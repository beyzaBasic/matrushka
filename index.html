<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Matrushka</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html {
  height: 100%;
  height: -webkit-fill-available;
}
body {
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100vw;
  /* Android Chrome / Samsung Internet: dvh gerçek görünen yüksekliği verir */
  height: 100vh;
  height: 100dvh;
  min-height: -webkit-fill-available;
  overflow: hidden;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}
canvas { display: block; touch-action: none; }

/* Portrait lock — telefon/tablet landscape'e döndürüldüğünde uyarı göster */
#orientation-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 9999;
  background: #111;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 16px;
  color: #fff;
  font-family: "ui-rounded","Arial Rounded MT Bold",sans-serif;
  font-size: 18px;
  text-align: center;
}
#orientation-overlay .icon { font-size: 52px; animation: rot 1.6s ease-in-out infinite alternate; }
@keyframes rot { from { transform: rotate(0deg); } to { transform: rotate(-90deg); } }
@media (max-width: 1024px) and (orientation: landscape) {
  #orientation-overlay { display: flex; }
}
</style>
</head>
<body>
<div id="orientation-overlay">
  <div class="icon">📱</div>
  <div>Lütfen cihazı döndürün</div>
  <div style="font-size:13px;opacity:0.6;">Please rotate to portrait</div>
</div>
<canvas id="c"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
<script type="module">
  import { Game } from './js/game.js';
  import { MapScreen } from './js/map.js';

  // Portrait kilidi — telefon/tablet (max 1024px) için
  const _isMobile = window.screen.width <= 1024 || window.screen.height <= 1024;
  if (_isMobile && screen.orientation?.lock) {
    screen.orientation.lock('portrait').catch(() => {});
  }

  const canvas = document.getElementById('c');

  // Game bir kez oluşturulur, map ile paylaşılır
  const game = new Game(canvas);
  window._matrushkaGame = game;

  window.addEventListener('keydown', e => {
    if (e.key === ' ') {
      import('./js/state.js').then(({ state }) => { state.isPaused = !state.isPaused; });
    }
  });

  canvas.style.display = 'none';

  // Map her zaman oluştur
  const map = new MapScreen(game);
  window._matrushkaMap = map;

  const tutDone = localStorage.getItem('matrushka_tutDone') === '1';
  console.log('tutDone:', tutDone, 'map:', map, '_div:', map._div);

  if (!tutDone) {
    canvas.style.display = 'block';
    game.startFromCheckpoint(0);
  } else {
    console.log('calling map.show()');
    map.show();
    console.log('map._div after show:', map._div);
  }
</script>
</body>
</html>
