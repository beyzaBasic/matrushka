<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Matrushka</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}
canvas { display: block; touch-action: none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
<script type="module">
  import { Game } from './js/game.js';
  import { MapScreen } from './js/map.js';

  const canvas = document.getElementById('c');

  // Game bir kez oluşturulur, map ile paylaşılır
  const game = new Game(canvas);
  window._matrushkaGame = game;

  window.addEventListener('keydown', e => {
    if (e.key === ' ') {
      import('./js/state.js').then(({ state }) => { state.isPaused = !state.isPaused; });
    }
  });

  // Map başlangıçta canvas'ı gizler, node tıklanınca game.startFromLevel() çağırır
  canvas.style.display = 'none';

  const map = new MapScreen(game);
  window._matrushkaMap = map;
  map.show();
</script>
</body>
</html>
