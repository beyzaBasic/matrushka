<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Matrushka</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html {
  height: 100%;
  height: -webkit-fill-available;
}
body {
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100vw;
  /* Android Chrome / Samsung Internet: dvh gerçek görünen yüksekliği verir */
  height: 100vh;
  height: 100dvh;
  min-height: -webkit-fill-available;
  overflow: hidden;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}
canvas { display: block; touch-action: none; }

/* ── In-game HTML Popups ─────────────────────────────────────────────────── */
.gp-overlay {
  position: fixed; inset: 0; z-index: 400;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.78);
  opacity: 0; transition: opacity 0.28s ease;
  pointer-events: none;
}
.gp-overlay.gp-visible { opacity: 1; pointer-events: all; }
.gp-overlay[hidden] { display: none !important; }

.gp-card {
  background: linear-gradient(160deg, #0d0820 0%, #1e1040 55%, #0d0820 100%);
  border-radius: 28px; padding: 36px 28px 28px;
  text-align: center; position: relative;
  border: 2px solid rgba(155,39,255,0.45);
  box-shadow: 0 0 60px rgba(155,39,255,0.30), 0 20px 60px rgba(0,0,0,0.6);
  max-width: 320px; width: 88%;
  transform: scale(0.5) rotate(-4deg);
  transition: transform 0.42s cubic-bezier(0.34,1.56,0.64,1);
  font-family: "ui-rounded","Arial Rounded MT Bold",sans-serif;
}
.gp-visible .gp-card { transform: scale(1) rotate(0deg); }
.gp-card--sm { max-width: 260px; padding: 32px 24px 24px; }

.gp-title {
  background: linear-gradient(90deg,#FFD700,#fff,#FF9500);
  background-size: 200% auto;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  animation: gp-shimmer 2s linear infinite;
  font-size: 32px; font-weight: 900; letter-spacing: 1px; margin-bottom: 8px;
}
.gp-title--red {
  background: linear-gradient(90deg,#FF4444,#fff,#FF8800);
  background-size: 200% auto;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  animation: gp-shimmer 2s linear infinite;
}

.gp-icon { font-size: 52px; margin-bottom: 12px; display: block; animation: gp-bounce 1.3s ease 0.3s both; }

.gp-pill {
  display: inline-block;
  background: rgba(255,255,255,0.12); border: 1.5px solid rgba(255,255,255,0.25);
  color: #fff; font-size: 14px; font-weight: 700;
  padding: 6px 18px; border-radius: 20px; margin-bottom: 20px;
}

.gp-stars { font-size: 36px; margin: 14px 0 18px; letter-spacing: 4px; }
.gp-star  { color: rgba(255,255,255,0.18); display: inline-block; }
.gp-star.on {
  color: #FFD700; text-shadow: 0 0 16px #FFD70099;
  animation: gp-star-in 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
}
.gp-star:nth-child(1).on { animation-delay: 0.30s; }
.gp-star:nth-child(2).on { animation-delay: 0.46s; }
.gp-star:nth-child(3).on { animation-delay: 0.62s; }

.gp-btn {
  display: block; width: 100%; padding: 16px; margin-top: 14px;
  background: linear-gradient(180deg,#69F0AE,#00E676,#00C853);
  color: #1B5E20; font-weight: 900; font-size: 16px; letter-spacing: 2px;
  border: 2.5px solid rgba(255,255,255,0.75); border-radius: 50px; cursor: pointer;
  font-family: "ui-rounded","Arial Rounded MT Bold",sans-serif;
  box-shadow: 0 6px 0 rgba(0,0,0,0.45), 0 8px 24px rgba(0,230,118,0.45);
  animation: gp-pulse 1.8s ease-in-out 0.4s infinite;
  position: relative; overflow: hidden;
}
.gp-btn::before {
  content: ''; position: absolute;
  top: 4px; left: 8px; right: 8px; height: 42%;
  background: rgba(255,255,255,0.50); border-radius: 50px; pointer-events: none;
}
.gp-btn:active { transform: scale(0.95); }

.gp-btn-ghost {
  display: block; width: 100%; padding: 14px; margin-top: 16px;
  background: rgba(255,255,255,0.12); border: 2px solid rgba(255,255,255,0.4);
  color: #fff; font-weight: 700; font-size: 18px;
  border-radius: 50px; cursor: pointer;
  font-family: "ui-rounded","Arial Rounded MT Bold",sans-serif;
}
.gp-btn-ghost:active { transform: scale(0.95); }

.gp-confetti { position: absolute; inset: 0; pointer-events: none; overflow: hidden; border-radius: 28px; }
.gp-confetti-p {
  position: absolute; top: -10px;
  animation: gp-fall linear both;
}

.gp-demo {
  display: flex; align-items: center; justify-content: center; gap: 8px; margin: 16px 0 20px;
}
.gp-demo-ball {
  border-radius: 50%;
  background: radial-gradient(circle at 35% 30%,rgba(255,255,255,0.55) 0%,#9B27FF 40%,#4A0080 100%);
  box-shadow: 0 0 14px rgba(155,39,255,0.55);
}
.gp-demo-ball--sm { width: 34px; height: 34px; animation: gp-merge-sm 2.2s ease-in-out infinite; }
.gp-demo-ball--lg { width: 54px; height: 54px; animation: gp-merge-lg 2.2s ease-in-out infinite; }
.gp-demo-plus, .gp-demo-arrow {
  color: rgba(255,255,255,0.65); font-size: 20px; font-weight: 900;
  font-family: "ui-rounded","Arial Rounded MT Bold",sans-serif;
}

@keyframes gp-shimmer  { from{background-position:200% center} to{background-position:-200% center} }
@keyframes gp-bounce   { 0%,100%{transform:translateY(0) scale(1)} 35%{transform:translateY(-18px) scale(1.14)} 65%{transform:translateY(5px) scale(0.96)} }
@keyframes gp-pulse    {
  0%,100% { transform:scale(1)    rotate(-1.2deg); box-shadow:0 6px 0 rgba(0,0,0,0.45),0 8px 24px rgba(0,230,118,0.45); }
  50%     { transform:scale(1.05) rotate( 1.2deg); box-shadow:0 6px 0 rgba(0,0,0,0.45),0 8px 40px rgba(0,230,118,0.75); }
}
@keyframes gp-star-in  { from{transform:scale(0) rotate(-30deg);opacity:0} to{transform:scale(1) rotate(0);opacity:1} }
@keyframes gp-fall     { from{transform:translateY(-10px) rotate(0)} to{transform:translateY(340px) rotate(720deg);opacity:0} }
@keyframes gp-merge-sm { 0%,35%{transform:scale(1) translateX(0);opacity:1} 50%{transform:scale(0) translateX(18px);opacity:0} 51%,100%{transform:scale(0);opacity:0} }
@keyframes gp-merge-lg { 0%,48%{transform:scale(1)} 58%{transform:scale(1.28)} 68%{transform:scale(0.96)} 80%,100%{transform:scale(1)} }

/* ── Tutorial popup card ────────────────────────────────────────────────── */
.gp-tut-card { background: rgba(20,18,40,0.72) !important; max-width: 340px; }
.gp-tut-title { animation: gp-shimmer 2s linear infinite, gp-tut-bob 2.3s ease-in-out infinite; }
@keyframes gp-tut-bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }

.gp-tut-demo {
  display: flex; align-items: flex-start; margin: 14px 0 4px;
}
.gp-tut-col {
  flex: 1; display: flex; flex-direction: column; align-items: center; padding-top: 4px;
}
.gp-tut-sep {
  width: 1.5px; background: rgba(255,255,255,0.25); margin: 10px 0; align-self: stretch;
}
.gp-tut-stage {
  position: relative; width: 100%; height: 58px;
  display: flex; align-items: center; justify-content: center;
}
.gp-tb {
  position: absolute; border-radius: 50%;
}
.gp-tb-yl, .gp-tb-yr {
  width: 22px; height: 22px;
  background: radial-gradient(circle at 33% 28%, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0) 65%), #FFD93D;
  box-shadow: 0 0 7px rgba(255,217,61,0.6);
}
.gp-tb-om {
  width: 30px; height: 30px;
  background: radial-gradient(circle at 33% 28%, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0) 65%), #FF9F1C;
  box-shadow: 0 0 14px rgba(255,159,28,0.7);
}
.gp-tut-ring {
  position: absolute; border-radius: 50%; width: 30px; height: 30px;
  border: 2px solid rgba(255,217,61,0.85); box-sizing: border-box;
}
.gp-tb-pk {
  width: 40px; height: 40px;
  background: radial-gradient(circle at 33% 28%, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0) 65%), #FF6B9D;
  box-shadow: 0 0 12px rgba(255,107,157,0.55);
  position: relative;
}
.gp-tb-oa {
  width: 20px; height: 20px;
  background: radial-gradient(circle at 33% 28%, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0) 65%), #FF9F1C;
}
.gp-tut-inner {
  position: absolute; border-radius: 50%; width: 18px; height: 18px;
  top: 50%; left: 50%;
  background: #FF9F1C; box-shadow: 0 0 0 3px rgba(255,255,255,0.28);
  transform: translate(-50%,-50%) scale(0); opacity: 0;
}
.gp-tut-lbl {
  font-size: 14px; font-weight: 900; color: #fff;
  text-shadow: 0 2px 0 rgba(0,0,0,0.32);
  margin-top: 7px; letter-spacing: 0.5px;
  font-family: "ui-rounded","Arial Rounded MT Bold",sans-serif;
}
.gp-tut-sub {
  font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.82);
  font-family: "ui-rounded","Arial Rounded MT Bold",sans-serif;
}
/* Merge keyframes — 1.5 s cycle */
.gp-tb-yl   { animation: gp-ml   1.5s ease-in-out infinite; }
.gp-tb-yr   { animation: gp-mr   1.5s ease-in-out infinite; }
.gp-tb-om   { animation: gp-mres 1.5s ease-in-out infinite; }
.gp-tut-ring{ animation: gp-mrng 1.5s ease-in-out infinite; }
/* Absorb keyframes */
.gp-tb-oa   { animation: gp-abs  1.5s ease-in-out infinite; }
.gp-tb-pk   { animation: gp-abig 1.5s ease-in-out infinite; }
.gp-tut-inner { animation: gp-ainn 1.5s ease-in-out infinite; }

@keyframes gp-ml {
  0%   { transform:translateX(-34px); opacity:1; }
  40%  { transform:translateX(-20px); opacity:1; }
  54%  { transform:translateX(0);     opacity:0; }
  100% { transform:translateX(0);     opacity:0; }
}
@keyframes gp-mr {
  0%   { transform:translateX(34px);  opacity:1; }
  40%  { transform:translateX(20px);  opacity:1; }
  54%  { transform:translateX(0);     opacity:0; }
  100% { transform:translateX(0);     opacity:0; }
}
@keyframes gp-mres {
  0%,54%   { transform:scale(0); opacity:0; }
  67%      { transform:scale(1.25); opacity:1; }
  76%      { transform:scale(0.93); opacity:1; }
  85%,100% { transform:scale(1); opacity:1; }
}
@keyframes gp-mrng {
  0%,54%   { transform:scale(1); opacity:0; }
  57%      { transform:scale(1.05); opacity:0.9; }
  82%,100% { transform:scale(2.4); opacity:0; }
}
@keyframes gp-abs {
  0%   { transform:translateX(-32px) scale(1); opacity:1; }
  45%  { transform:translateX(-12px) scale(1); opacity:1; }
  64%  { transform:translateX(2px)   scale(0); opacity:0; }
  100% { transform:translateX(2px)   scale(0); opacity:0; }
}
@keyframes gp-abig {
  0%,44%   { transform:scale(1); }
  60%      { transform:scale(1.13); }
  72%      { transform:scale(0.94); }
  82%,100% { transform:scale(1); }
}
@keyframes gp-ainn {
  0%,64%   { transform:translate(-50%,-50%) scale(0); opacity:0; }
  74%      { transform:translate(-50%,-50%) scale(1.15); opacity:1; }
  82%,100% { transform:translate(-50%,-50%) scale(1); opacity:1; }
}

/* Portrait lock — telefon/tablet landscape'e döndürüldüğünde uyarı göster */
#orientation-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 9999;
  background: #111;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 16px;
  color: #fff;
  font-family: "ui-rounded","Arial Rounded MT Bold",sans-serif;
  font-size: 18px;
  text-align: center;
}
#orientation-overlay .icon { font-size: 52px; animation: rot 1.6s ease-in-out infinite alternate; }
@keyframes rot { from { transform: rotate(0deg); } to { transform: rotate(-90deg); } }
@media (max-width: 1024px) and (orientation: landscape) {
  #orientation-overlay { display: flex; }
}
</style>
</head>
<body>
<div id="orientation-overlay">
  <div class="icon">📱</div>
  <div>Lütfen cihazı döndürün</div>
  <div style="font-size:13px;opacity:0.6;">Please rotate to portrait</div>
</div>
<canvas id="c"></canvas>

<!-- ── In-game HTML Popups ───────────────────────────────────────────────── -->

<div id="gp-success" class="gp-overlay" hidden>
  <div class="gp-card">
    <div class="gp-confetti" id="gp-success-confetti"></div>
    <div class="gp-title">SUCCESS!</div>
    <div class="gp-stars">
      <span class="gp-star">★</span>
      <span class="gp-star">★</span>
      <span class="gp-star">★</span>
    </div>
    <button class="gp-btn" id="gp-success-cta">NEXT ▶</button>
  </div>
</div>

<div id="gp-gameover" class="gp-overlay" hidden>
  <div class="gp-card">
    <span class="gp-icon">😵</span>
    <div class="gp-title gp-title--red">GAME OVER</div>
    <div class="gp-pill" id="gp-gameover-level">Level 1</div>
    <button class="gp-btn" id="gp-gameover-cta">▶  PLAY AGAIN</button>
  </div>
</div>

<div id="gp-pause" class="gp-overlay" hidden>
  <div class="gp-card gp-card--sm">
    <div class="gp-title">PAUSED</div>
    <button class="gp-btn-ghost" id="gp-pause-cta">▶  Play</button>
  </div>
</div>

<div id="gp-tutorial" class="gp-overlay" hidden>
  <div class="gp-card gp-tut-card">
    <div class="gp-confetti" id="gp-tutorial-confetti"></div>

    <div class="gp-title gp-tut-title">READY?</div>

    <div class="gp-tut-demo">
      <!-- MERGE column -->
      <div class="gp-tut-col">
        <div class="gp-tut-stage">
          <div class="gp-tb gp-tb-yl"></div>
          <div class="gp-tb gp-tb-yr"></div>
          <div class="gp-tb gp-tb-om"></div>
          <div class="gp-tut-ring"></div>
        </div>
        <span class="gp-tut-lbl">MERGE</span>
        <span class="gp-tut-sub">same + same</span>
      </div>

      <div class="gp-tut-sep"></div>

      <!-- ABSORB column -->
      <div class="gp-tut-col">
        <div class="gp-tut-stage">
          <div class="gp-tb gp-tb-pk">
            <div class="gp-tut-inner"></div>
          </div>
          <div class="gp-tb gp-tb-oa"></div>
        </div>
        <span class="gp-tut-lbl">ABSORB</span>
        <span class="gp-tut-sub">big eats small</span>
      </div>
    </div>

    <button class="gp-btn" id="gp-tutorial-cta">PLAY!</button>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
<script type="module">
  import { Game } from './js/game.js';
  import { MapScreen } from './js/map.js';

  // Portrait kilidi — telefon/tablet (max 1024px) için
  const _isMobile = window.screen.width <= 1024 || window.screen.height <= 1024;
  if (_isMobile && screen.orientation?.lock) {
    screen.orientation.lock('portrait').catch(() => {});
  }

  const canvas = document.getElementById('c');

  // Game bir kez oluşturulur, map ile paylaşılır
  const game = new Game(canvas);
  window._matrushkaGame = game;

  window.addEventListener('keydown', e => {
    if (e.key === ' ') {
      import('./js/state.js').then(({ state }) => { state.isPaused = !state.isPaused; });
    }
  });

  canvas.style.display = 'none';

  // Map her zaman oluştur
  const map = new MapScreen(game);
  window._matrushkaMap = map;

  const tutDone = localStorage.getItem('matrushka_tutDone') === '1';
  console.log('tutDone:', tutDone, 'map:', map, '_div:', map._div);

  if (!tutDone) {
    canvas.style.display = 'block';
    game.startFromCheckpoint(0);
  } else {
    console.log('calling map.show()');
    map.show();
    console.log('map._div after show:', map._div);
  }
</script>
</body>
</html>
